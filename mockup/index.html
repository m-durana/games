<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0c0e11" />
<title>Flight Deck</title>
<link rel="icon" href="/games/flight-deck/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=B612:wght@400;700&family=B612+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  --bg:        #0c0e11;
  --panel:     #1a1d22;
  --panel-2:   #15181c;
  --bezel-hi:  #353a42;
  --bezel-lo:  #08090b;

  --label:     #c8d0da;
  --label-2:   #a0a8b3;
  --label-dim: #707782;
  --label-faint: #4a5058;

  --led-off:   #2a2d33;
  --led-amber: #fbbf24;
  --led-cyan:  #60d8f0;
  --led-red:   #f87171;

  --mfd-bg:    #051410;
  --mfd-text:  #6cd47e;
  --mfd-dim:   #3d8059;

  --sans: "B612", ui-sans-serif, system-ui, sans-serif;
  --mono: "B612 Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

  color-scheme: dark;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--label);
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overscroll-behavior-y: none;
}
::selection { background: var(--led-cyan); color: var(--bg); }
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

#app {
  min-height: 100dvh;
  padding: 1rem;
  padding-top: max(1rem, env(safe-area-inset-top));
  padding-bottom: max(1rem, env(safe-area-inset-bottom));
  display: flex;
  justify-content: center;
}
.frame {
  width: 100%;
  max-width: 1140px;
  display: flex;
  flex-direction: column;
  gap: 1.05rem;
}

/* ─── header ─────────────────────────────────── */
.bar {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding: 0 0.4rem;
  height: 34px;
}
.brand {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 0.34em;
  color: var(--label);
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
}
.brand .glyph { width: 18px; height: 18px; }
.brand .glyph svg { width: 100%; height: 100%; display: block; }

.spacer { flex: 1; }

.diff {
  display: inline-flex;
  border: 1px solid var(--bezel-hi);
  border-bottom-color: var(--bezel-lo);
  border-right-color: var(--bezel-lo);
  background: var(--panel);
  border-radius: 1px;
}
.diff button {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--label-dim);
  padding: 0.42rem 0.85rem 0.4rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}
.diff button + button { border-left: 1px solid var(--bezel-lo); }
.diff button .led {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--led-off);
  border: 1px solid var(--bezel-lo);
}
.diff button:hover { color: var(--label); }
.diff button.on { color: var(--label); background: var(--panel-2); }
.diff button.on .led { background: var(--led-amber); }

.cog {
  width: 28px; height: 28px;
  color: var(--label-dim);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--bezel-hi);
  border-bottom-color: var(--bezel-lo);
  border-right-color: var(--bezel-lo);
  background: var(--panel);
  border-radius: 1px;
}
.cog:hover { color: var(--label); }
.cog:active {
  border-color: var(--bezel-lo);
  border-bottom-color: var(--bezel-hi);
  border-right-color: var(--bezel-hi);
}
.cog svg { width: 14px; height: 14px; stroke-width: 1.6; }

/* ─── bezel ──────────────────────────────────── */
.bezel {
  position: relative;
  background: var(--panel);
  border: 1px solid var(--bezel-hi);
  border-bottom-color: var(--bezel-lo);
  border-right-color: var(--bezel-lo);
  border-radius: 2px;
  padding: 1.1rem 0.7rem 0.65rem;
}
.bezel::before {
  content: attr(data-label);
  position: absolute;
  top: -0.42rem;
  left: 0.85rem;
  background: var(--bg);
  padding: 0 0.45rem;
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--label-dim);
  font-weight: 700;
  height: 14px;
  display: inline-flex;
  align-items: center;
}

/* mix button on the bezel border, top-right (same y-level as label) */
.bezel-mix {
  position: absolute;
  top: -0.5rem;
  right: 0.65rem;
  background: var(--bg);
  padding: 0 0.05rem;
  display: inline-flex;
  align-items: center;
  height: 18px;
  z-index: 2;
}
.bezel-mix .mix-btn {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--led-cyan);
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.18rem 0.55rem;
  border: 1px solid var(--bezel-hi);
  border-bottom-color: var(--bezel-lo);
  border-right-color: var(--bezel-lo);
  background: var(--panel);
  border-radius: 1px;
  font-weight: 700;
}
.bezel-mix .mix-btn:hover { color: #b0ecf6; }
.bezel-mix .mix-btn:active {
  border-color: var(--bezel-lo);
  border-bottom-color: var(--bezel-hi);
  border-right-color: var(--bezel-hi);
}
.bezel-mix svg { width: 10px; height: 10px; stroke-width: 1.9; }

/* ─── pushbutton — mode chip (uniform) ───────── */
.pbtn {
  position: relative;
  display: grid;
  grid-template-columns: 22px 1fr;
  grid-template-rows: auto auto;
  grid-template-areas:
    "icon title"
    "desc  desc";
  column-gap: 0.55rem;
  row-gap: 0.2rem;
  padding: 0.55rem 0.7rem 0.7rem 0.6rem;
  background: var(--panel-2);
  border: 1px solid var(--bezel-hi);
  border-bottom-color: var(--bezel-lo);
  border-right-color: var(--bezel-lo);
  border-radius: 1px;
  cursor: pointer;
  min-height: 78px;
  width: 100%;
  text-align: left;
}
.pbtn:hover .pbtn-engrave { color: #fff; }
.pbtn:hover .pbtn-icon { animation: icon-pulse 1.4s ease-in-out infinite; }
.pbtn:active {
  border-color: var(--bezel-lo);
  border-bottom-color: var(--bezel-hi);
  border-right-color: var(--bezel-hi);
}
@keyframes icon-pulse {
  0%, 100% { color: var(--label-dim); }
  50%      { color: var(--label); }
}

.pbtn-led {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--led-off);
  border: 1px solid var(--bezel-lo);
  position: absolute;
  top: 0.32rem;
  right: 0.4rem;
}
.pbtn.lit-amber .pbtn-led { background: var(--led-amber); }

.pbtn-icon {
  grid-area: icon;
  width: 22px; height: 22px;
  color: var(--label-dim);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  align-self: start;
  margin-top: 1px;
}
.pbtn-icon svg { width: 20px; height: 20px; stroke-width: 1.55; }

.pbtn-engrave {
  grid-area: title;
  font-family: var(--mono);
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  color: var(--label);
  text-transform: uppercase;
  align-self: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding-right: 2.6rem; /* keep clear of LED + score */
}

.pbtn-desc {
  grid-area: desc;
  font-family: var(--sans);
  font-weight: 400;
  font-size: 0.68rem;
  letter-spacing: 0;
  color: var(--label-dim);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* info ? badge — only renders on .has-info chips */
.pbtn.has-info .pbtn-engrave::after {
  content: "?";
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 13px; height: 13px;
  margin-left: 0.45rem;
  vertical-align: 1px;
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--label-faint);
  border: 1px solid var(--bezel-hi);
  background: var(--panel);
  border-radius: 50%;
  font-weight: 700;
  letter-spacing: 0;
  cursor: help;
}
.pbtn.has-info:hover .pbtn-engrave::after { color: var(--led-cyan); border-color: var(--led-cyan); }

/* last score chip, top-right next to the LED */
.pbtn-last {
  position: absolute;
  top: 0.28rem;
  right: 0.95rem;
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.04em;
  color: var(--label-faint);
  font-variant-numeric: tabular-nums;
  pointer-events: none;
}

/* primary (Daily / Speed / Mix) — bigger pushbuttons */
.pbtn.lg {
  min-height: 96px;
  padding: 0.7rem 0.9rem 0.85rem 0.7rem;
  grid-template-columns: 28px 1fr;
  column-gap: 0.7rem;
}
.pbtn.lg .pbtn-icon { width: 28px; height: 28px; }
.pbtn.lg .pbtn-icon svg { width: 26px; height: 26px; }
.pbtn.lg .pbtn-engrave { font-size: 0.82rem; }
.pbtn.lg .pbtn-desc { font-size: 0.72rem; }
.pbtn.lg .pbtn-last { font-size: 0.66rem; top: 0.4rem; right: 1.1rem; }

/* ─── grids ──────────────────────────────────── */
.btn-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0.5rem;
}
.btn-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

@media (max-width: 880px) {
  .btn-grid.cols-3 { grid-template-columns: 1fr; }
}

.row-2 {
  display: grid;
  grid-template-columns: 9fr 7fr;
  gap: 1.05rem;
}
.row-3 {
  display: grid;
  grid-template-columns: 4fr 3fr 5fr;
  gap: 1.05rem;
}
@media (max-width: 980px) {
  .row-2, .row-3 { grid-template-columns: 1fr; }
}

/* ─── MFD ────────────────────────────────────── */
.mfd-screen {
  background: var(--mfd-bg);
  border: 1px solid var(--bezel-lo);
  border-radius: 2px;
  padding: 0.4rem 0.55rem;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--mfd-text);
  letter-spacing: 0.04em;
  display: flex;
  flex-direction: column;
}
.mfd-row {
  display: grid;
  grid-template-columns: 14px 60px 1fr 70px 56px 14px;
  align-items: center;
  gap: 0.65rem;
  padding: 0.32rem 0.25rem;
  cursor: pointer;
  border-radius: 1px;
}
.mfd-row + .mfd-row { border-top: 1px solid rgba(108,212,126,0.10); }
.mfd-row:hover { background: rgba(108,212,126,0.08); }
.mfd-row .pre { color: var(--mfd-dim); }
.mfd-row:hover .pre { color: var(--mfd-text); }
.mfd-row .ts { color: var(--mfd-dim); font-variant-numeric: tabular-nums; }
.mfd-row .name { color: var(--mfd-text); text-transform: uppercase; letter-spacing: 0.06em; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mfd-row .name .cat { color: var(--mfd-dim); margin-right: 0.45rem; }
.mfd-row .diff {
  color: var(--mfd-dim);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.mfd-row .score { color: var(--mfd-text); font-variant-numeric: tabular-nums; text-align: right; font-weight: 700; }
.mfd-row.bad .score { color: var(--led-amber); }
.mfd-row.bad-2 .score { color: var(--led-red); }
.mfd-row .chev { color: var(--mfd-dim); text-align: center; }
.mfd-row:hover .chev { color: var(--mfd-text); }
.mfd-row.resume { grid-template-columns: 14px 1fr 80px 60px 14px; }
@media (max-width: 600px) {
  .mfd-row { grid-template-columns: 14px 56px 1fr 50px 14px; }
  .mfd-row .diff { display: none; }
}

.frame > * { opacity: 0; animation: enter 0.32s cubic-bezier(.2,.7,.2,1) forwards; }
.frame > *:nth-child(1) { animation-delay: 0s; }
.frame > *:nth-child(2) { animation-delay: 0.06s; }
.frame > *:nth-child(3) { animation-delay: 0.12s; }
.frame > *:nth-child(4) { animation-delay: 0.18s; }
.frame > *:nth-child(5) { animation-delay: 0.22s; }
@keyframes enter { to { opacity: 1; } }
@media (prefers-reduced-motion: reduce) {
  .frame > * { animation: none; opacity: 1; }
  .pbtn:hover .pbtn-icon { animation: none; }
}
</style>
</head>
<body>

<main id="app">
  <div class="frame">

    <!-- HEADER -->
    <header class="bar">
      <span class="brand">
        <span class="glyph">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7">
            <path d="M3 17 L12 4 L21 17" stroke="#60d8f0"/>
            <path d="M7 17 L12 10 L17 17" stroke="#7a818c"/>
          </svg>
        </span>
        FLIGHT DECK
      </span>
      <span class="spacer"></span>
      <div class="diff" role="tablist">
        <button><span class="led"></span>Easy</button>
        <button class="on" aria-selected="true"><span class="led"></span>Normal</button>
        <button><span class="led"></span>Hard</button>
      </div>
      <button class="cog" aria-label="Settings"><i data-lucide="settings"></i></button>
    </header>

    <!-- PRIMARY -->
    <section class="bezel" data-label="Primary Runs">
      <div class="btn-grid cols-3">
        <button class="pbtn lg">
          <span class="pbtn-led"></span>
          <span class="pbtn-icon"><i data-lucide="calendar-days"></i></span>
          <span class="pbtn-engrave">DAILY</span>
          <span class="pbtn-desc">Today's curated 10. Same set for everyone every day. Resets 00Z.</span>
          <span class="pbtn-last">9/10</span>
        </button>
        <button class="pbtn lg">
          <span class="pbtn-led"></span>
          <span class="pbtn-icon"><i data-lucide="timer"></i></span>
          <span class="pbtn-engrave">SPEED · 60s</span>
          <span class="pbtn-desc">Sixty-second sprint. Combo bonus every 3 in a row.</span>
          <span class="pbtn-last">34</span>
        </button>
        <button class="pbtn lg">
          <span class="pbtn-led"></span>
          <span class="pbtn-icon"><i data-lucide="shuffle"></i></span>
          <span class="pbtn-engrave">RANDOM 10</span>
          <span class="pbtn-desc">Daily-style mix. Replay as much as you like.</span>
          <span class="pbtn-last">12/15</span>
        </button>
      </div>
    </section>

    <!-- AIRLINES + AIRPORTS -->
    <section class="row-2">
      <div class="bezel" data-label="Airlines">
        <span class="bezel-mix"><button class="mix-btn"><i data-lucide="shuffle"></i>Mix</button></span>
        <div class="btn-grid">
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="building-2"></i></span><span class="pbtn-engrave">GROUP</span><span class="pbtn-desc">Identify the parent group an airline belongs to.</span><span class="pbtn-last">7/10</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="handshake"></i></span><span class="pbtn-engrave">ALLIANCE</span><span class="pbtn-desc">Star, Oneworld, SkyTeam, or no alliance.</span><span class="pbtn-last">5/10</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="plane-takeoff"></i></span><span class="pbtn-engrave">HUB</span><span class="pbtn-desc">Pick the airline's primary hub airport.</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="image"></i></span><span class="pbtn-engrave">LOGO</span><span class="pbtn-desc">Identify the airline from its logo.</span><span class="pbtn-last">8/10</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="globe"></i></span><span class="pbtn-engrave">COUNTRY</span><span class="pbtn-desc">Where is the airline registered?</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="split"></i></span><span class="pbtn-engrave">REVERSE</span><span class="pbtn-desc">Select every airline in a given group.</span></button>
          <button class="pbtn lit-amber"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="plane"></i></span><span class="pbtn-engrave">TAIL</span><span class="pbtn-desc">Identify the airline from its tail livery.</span><span class="pbtn-last">6/10</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="hash"></i></span><span class="pbtn-engrave">CODE</span><span class="pbtn-desc">IATA / ICAO carrier code to airline.</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="radio"></i></span><span class="pbtn-engrave">CALLSIGN</span><span class="pbtn-desc">Pick the radio callsign each airline uses.</span><span class="pbtn-last">4/10</span></button>
        </div>
      </div>
      <div class="bezel" data-label="Airports">
        <span class="bezel-mix"><button class="mix-btn"><i data-lucide="shuffle"></i>Mix</button></span>
        <div class="btn-grid">
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="tower-control"></i></span><span class="pbtn-engrave">CARRIERS</span><span class="pbtn-desc">Pick a top carrier at the airport.</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="route"></i></span><span class="pbtn-engrave">A. ROUTES</span><span class="pbtn-desc">Find the airline's top destination.</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="map-pin"></i></span><span class="pbtn-engrave">A. CONN</span><span class="pbtn-desc">Find the rank-1 destination from the airport.</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="map-pinned"></i></span><span class="pbtn-engrave">WHERE AM I</span><span class="pbtn-desc">Deduce the airport from its top destinations.</span><span class="pbtn-last">5/10</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="building"></i></span><span class="pbtn-engrave">HUB OF</span><span class="pbtn-desc">Pick the airline whose primary hub this is.</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="grid-3x3"></i></span><span class="pbtn-engrave">WORDLE</span><span class="pbtn-desc">Deduce a mystery airport in 6 guesses.</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="camera"></i></span><span class="pbtn-engrave">IDENTIFY</span><span class="pbtn-desc">Spot an airport from a photo with hints.</span><span class="pbtn-last">7/10</span></button>
        </div>
      </div>
    </section>

    <!-- AIRCRAFT + RADIO + RADAR -->
    <section class="row-3">
      <div class="bezel" data-label="Aircraft">
        <span class="bezel-mix"><button class="mix-btn"><i data-lucide="shuffle"></i>Mix</button></span>
        <div class="btn-grid">
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="plane"></i></span><span class="pbtn-engrave">IDENTIFY</span><span class="pbtn-desc">Spot a plane from a photo with hints.</span><span class="pbtn-last">8/10</span></button>
          <button class="pbtn lit-amber"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="grid-3x3"></i></span><span class="pbtn-engrave">WORDLE</span><span class="pbtn-desc">Deduce in 6 guesses, attribute clues.</span><span class="pbtn-last">6/10</span></button>
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="crosshair"></i></span><span class="pbtn-engrave">MILITARY</span><span class="pbtn-desc">Photo of a combat aircraft, with hints.</span></button>
          <button class="pbtn"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="swords"></i></span><span class="pbtn-engrave">MIL WRDL</span><span class="pbtn-desc">Fighters, bombers, helos · 6 guesses.</span></button>
        </div>
      </div>
      <div class="bezel" data-label="Radio">
        <span class="bezel-mix"><button class="mix-btn"><i data-lucide="shuffle"></i>Mix</button></span>
        <div class="btn-grid">
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="message-square-text"></i></span><span class="pbtn-engrave">DECODE</span><span class="pbtn-desc">Translate ATC phraseology to plain English.</span><span class="pbtn-last">9/10</span></button>
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="spell-check"></i></span><span class="pbtn-engrave">COMPOSE</span><span class="pbtn-desc">Build the correct readback to ATC.</span></button>
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="navigation"></i></span><span class="pbtn-engrave">CLEARED</span><span class="pbtn-desc">Spot the missing or wrong clearance.</span></button>
        </div>
      </div>
      <div class="bezel" data-label="Radar">
        <span class="bezel-mix"><button class="mix-btn"><i data-lucide="shuffle"></i>Mix</button></span>
        <div class="btn-grid">
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="radar"></i></span><span class="pbtn-engrave">CONFLICT</span><span class="pbtn-desc">Tap the two aircraft on a collision course.</span><span class="pbtn-last">3/10</span></button>
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="list-ordered"></i></span><span class="pbtn-engrave">SEQUENCE</span><span class="pbtn-desc">Tap arrivals in landing order.</span></button>
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="gauge"></i></span><span class="pbtn-engrave">STABLE</span><span class="pbtn-desc">PFD at 1000ft AGL — continue or go-around?</span></button>
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="cloud-fog"></i></span><span class="pbtn-engrave">MINIMUMS</span><span class="pbtn-desc">At DA — what visual reference do you have?</span></button>
          <button class="pbtn has-info"><span class="pbtn-led"></span><span class="pbtn-icon"><i data-lucide="monitor-cog"></i></span><span class="pbtn-engrave">FMA</span><span class="pbtn-desc">Watch the FMA strip for autoland degrades.</span></button>
        </div>
      </div>
    </section>

    <!-- MFD: RESUME + RECENT -->
    <section class="row-2">
      <div class="bezel" data-label="MFD · Resume">
        <div class="mfd-screen">
          <a class="mfd-row resume">
            <span class="pre">▸</span>
            <span class="name"><span class="cat">AIRCRAFT</span>WORDLE</span>
            <span class="diff">NORMAL</span>
            <span class="score">3/6</span>
            <span class="chev">›</span>
          </a>
          <a class="mfd-row resume">
            <span class="pre">▸</span>
            <span class="name"><span class="cat">AIRLINES</span>TAIL</span>
            <span class="diff">NORMAL</span>
            <span class="score">4/10</span>
            <span class="chev">›</span>
          </a>
        </div>
      </div>
      <div class="bezel" data-label="MFD · Recent Rounds">
        <div class="mfd-screen">
          <a class="mfd-row">
            <span class="pre">›</span>
            <span class="ts">14:30Z</span>
            <span class="name"><span class="cat">AIRCRAFT</span>WORDLE</span>
            <span class="diff">NORMAL</span>
            <span class="score">8/10</span>
            <span class="chev">›</span>
          </a>
          <a class="mfd-row bad">
            <span class="pre">›</span>
            <span class="ts">13:55Z</span>
            <span class="name"><span class="cat">AIRLINES</span>TAIL</span>
            <span class="diff">NORMAL</span>
            <span class="score">6/10</span>
            <span class="chev">›</span>
          </a>
          <a class="mfd-row">
            <span class="pre">›</span>
            <span class="ts">13:42Z</span>
            <span class="name"><span class="cat">RADIO</span>DECODE</span>
            <span class="diff">HARD</span>
            <span class="score">9/10</span>
            <span class="chev">›</span>
          </a>
          <a class="mfd-row bad-2">
            <span class="pre">›</span>
            <span class="ts">13:18Z</span>
            <span class="name"><span class="cat">RADAR</span>CONFLICT</span>
            <span class="diff">NORMAL</span>
            <span class="score">3/10</span>
            <span class="chev">›</span>
          </a>
        </div>
      </div>
    </section>

    <div style="text-align:center;margin-top:0.4rem;">
      <a href="/games/flight-deck/mockup/round/" style="font-family:var(--mono);font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--led-cyan);">→ See round-screen mockups</a>
    </div>

  </div>
</main>

<script>
  document.querySelectorAll('.diff').forEach(g => {
    g.addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      g.querySelectorAll('button').forEach(x => { x.classList.remove('on'); x.removeAttribute('aria-selected'); });
      b.classList.add('on');
      b.setAttribute('aria-selected', 'true');
    });
  });
  if (window.lucide) lucide.createIcons();
</script>
</body>
</html>
