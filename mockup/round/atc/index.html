<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0c0e11" />
<title>Flight Deck · ATC round</title>
<link rel="icon" href="/games/flight-deck/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=B612:wght@400;700&family=B612+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/games/flight-deck/mockup/round/_round.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
.frame { max-width: 880px; }

/* radio call: tower icon + speech bubble */
.atc-call { display: grid; grid-template-columns: 56px 1fr; gap: 0.85rem; align-items: stretch; }
.atc-tower {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--mfd-text);
  padding: 0.2rem 0;
}
.atc-tower svg { width: auto !important; height: 100% !important; max-height: 100%; stroke-width: 1.3; }
.atc-bubble {
  position: relative;
  background: var(--mfd-bg);
  border: 1px solid var(--bezel-lo);
  border-radius: 2px;
  padding: 0.85rem 1rem 0.95rem;
}
/* triangle pointer toward tower */
.atc-bubble::before {
  content: "";
  position: absolute;
  left: -7px; top: 18px;
  width: 0; height: 0;
  border-top: 7px solid transparent;
  border-bottom: 7px solid transparent;
  border-right: 7px solid var(--bezel-lo);
}
.atc-bubble::after {
  content: "";
  position: absolute;
  left: -6px; top: 19px;
  width: 0; height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-right: 6px solid var(--mfd-bg);
}
.atc-meta {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  color: var(--mfd-dim);
  text-transform: uppercase;
  margin-bottom: 0.4rem;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.atc-phrase {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 1.02rem;
  color: var(--mfd-text);
  letter-spacing: 0.05em;
  line-height: 1.5;
  text-transform: uppercase;
}
.atc-phrase q { quotes: "“" "”"; }

.opts-stack { display: flex; flex-direction: column; gap: 0.4rem; }
.opt {
  display: grid;
  grid-template-columns: 24px 1fr 18px;
  align-items: center;
  gap: 0.7rem;
  padding: 0.8rem 0.85rem;
  background: var(--panel-2);
  border: 1px solid var(--bezel-hi);
  border-bottom-color: var(--bezel-lo);
  border-right-color: var(--bezel-lo);
  border-radius: 1px;
  cursor: pointer;
}
.opt-key { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; font-family: var(--mono); font-size: 0.66rem; color: var(--label-dim); border: 1px solid var(--bezel-hi); border-bottom-color: var(--bezel-lo); border-right-color: var(--bezel-lo); background: var(--bg); border-radius: 1px; font-weight: 700; }
.opt-text { font-family: var(--sans); font-weight: 400; font-size: 0.92rem; color: var(--label); line-height: 1.4; }
.opt-led { width: 7px; height: 7px; border-radius: 50%; background: var(--led-off); border: 1px solid var(--bezel-lo); justify-self: center; }
.opt:hover .opt-text { color: #fff; }
.opt:hover .opt-key { color: var(--led-cyan); border-color: var(--led-cyan); }
.opt:active { border-color: var(--bezel-lo); border-bottom-color: var(--bezel-hi); border-right-color: var(--bezel-hi); }
</style>
</head>
<body>
<main id="app">
  <div class="frame">

    <header class="bar">
      <span class="brand"><span class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7"><path d="M3 17 L12 4 L21 17" stroke="#60d8f0"/><path d="M7 17 L12 10 L17 17" stroke="#7a818c"/></svg></span>FLIGHT DECK</span>
      <span class="spacer"></span>
      <span class="diff-tag"><span class="led"></span>NORMAL</span>
      <span class="score-tag">SCORE <b>3</b>/10</span>
      <button class="quit-btn"><i data-lucide="x"></i>Quit</button>
    </header>

    <section class="progress">
      <span class="progress-label">Progress</span>
      <span class="progress-leds">
        <span class="p-led correct"></span><span class="p-led wrong"></span><span class="p-led correct"></span><span class="p-led correct"></span>
        <span class="p-led current"></span><span class="p-led"></span><span class="p-led"></span><span class="p-led"></span><span class="p-led"></span><span class="p-led"></span>
      </span>
      <span class="progress-streak"><i data-lucide="flame"></i><span>×2</span></span>
    </section>

    <section class="bezel" data-label="Decode ATC">
      <span class="bezel-aux">Q5 / 10</span>
      <span class="bezel-info"><button><i data-lucide="circle-help"></i>Field guide</button></span>

      <div class="atc-call">
        <div class="atc-tower" aria-hidden="true">
          <i data-lucide="tower-control"></i>
        </div>
        <div class="atc-bubble">
          <div class="atc-meta">
            <span>Inbound · APPROACH</span>
            <span>COM 1 · 119.350 MHz</span>
          </div>
          <div class="atc-phrase">
            <q>BAW462, descend via the GIBSO ONE arrival, expect ILS runway 27R, speed 250 below ten thousand.</q>
          </div>
        </div>
      </div>

      <div style="height:0.85rem;"></div>

      <div class="opts-stack">
        <button class="opt"><span class="opt-key">1</span><span class="opt-text">Descend on the GIBSO 1 STAR with profile/speed restrictions, expect ILS 27R, keep 250 KIAS or less below FL100.</span><span class="opt-led"></span></button>
        <button class="opt"><span class="opt-key">2</span><span class="opt-text">Descend now to ten thousand, fly direct GIBSO, expect ILS 27R, accelerate to 250 KIAS.</span><span class="opt-led"></span></button>
        <button class="opt"><span class="opt-key">3</span><span class="opt-text">Hold over GIBSO at ten thousand, expect runway 27R, maintain 250 KIAS.</span><span class="opt-led"></span></button>
        <button class="opt"><span class="opt-key">4</span><span class="opt-text">Cleared GIBSO 1 RNAV approach to runway 27R, descend via, no speed restrictions.</span><span class="opt-led"></span></button>
      </div>
    </section>

    <div class="round-nav-wrap">
      <nav class="round-nav">
        <a href="/games/flight-deck/mockup/round/">Multi-choice</a>
        <a href="/games/flight-deck/mockup/round/wordle/">Wordle</a>
        <a href="/games/flight-deck/mockup/round/identify/">Identify</a>
        <a class="on" href="/games/flight-deck/mockup/round/atc/">ATC</a>
        <a href="/games/flight-deck/mockup/round/compose/">Compose</a>
        <a href="/games/flight-deck/mockup/round/intercept/">Split (PFD+choice)</a>
        <a href="/games/flight-deck/mockup/">← Home</a>
      </nav>
    </div>

  </div>
</main>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
